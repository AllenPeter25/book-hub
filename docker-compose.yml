version: '3.9'

services:
  postgres-book:
    image: postgres:16
    container_name: postgres-book
    environment:
      POSTGRES_DB: bookdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  postgres-inventory:
    image: postgres:16
    container_name: postgres-inventory
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  mongodb:
    image: mongo:8
    container_name: mongodb-review
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: reviewdb