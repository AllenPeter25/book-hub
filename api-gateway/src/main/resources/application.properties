spring.application.name=api-gateway

server.port=${PORT:8080}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webmvc.discovery.locator.enabled=true
spring.cloud.gateway.server.webmvc.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webmvc.routes[0].id=books-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://books-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/books/**

spring.cloud.gateway.server.webmvc.routes[1].id=reviews-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://reviews-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/reviews/**

spring.cloud.gateway.server.webmvc.routes[2].id=inventory-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://inventory-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/inventory/**
